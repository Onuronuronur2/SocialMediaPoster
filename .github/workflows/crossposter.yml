name: TikTok → Instagram Crossposter

on:
  # schedule:
  #   - cron: "*/20 * * * *"   # deaktiviert – cron-job.org übernimmt
  workflow_dispatch:           # wird von cron-job.org alle 15 Min ausgelöst

# Nötig damit der Job temporäre GitHub Releases erstellen kann (Video-Hosting für Instagram)
permissions:
  contents: write

jobs:
  crossposter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: ffmpeg installieren
        run: sudo apt-get install -y ffmpeg

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: yt-dlp auf aktuellste Version bringen
        run: yt-dlp -U || true   # nicht kritisch, Fehler ignorieren

      - name: Crossposter ausführen
        env:
          TIKTOK_USERNAME:        ${{ secrets.TIKTOK_USERNAME }}
          TIKTOK_COOKIES_B64:     ${{ secrets.TIKTOK_COOKIES_B64 }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID:       ${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET:   ${{ secrets.INSTAGRAM_APP_SECRET }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
          GIST_ID:                ${{ secrets.GIST_ID }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ARCHIVE_REPO:           ${{ vars.ARCHIVE_REPO }}
          ARCHIVE_TOKEN:          ${{ secrets.ARCHIVE_TOKEN }}
          POSTING_WINDOW:         ${{ vars.POSTING_WINDOW }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:      ${{ github.repository }}
        run: python scripts/main.py
